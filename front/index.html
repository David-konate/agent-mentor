<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- L'app est servie sous /mentor/ : tous les chemins relatifs partent de là -->
    <base href="/mentor/">
    <title>Mentor Senior - Assistant CDA</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <div class="langues">
            <button type="button" data-lang="fr">FR</button>
            <button type="button" data-lang="en">EN</button>
        </div>
        <h1 data-i18n="title">🧑‍🏫 Mentor Senior</h1>
        <p data-i18n="subtitle">Ton tuteur IA pour la formation CDA — il te guide, il ne code pas à ta place.</p>
    </header>

    <!-- ═══════ VUE AUTH (visible si PAS connecté) ═══════ -->
    <div id="auth-view">
        <form id="login-form" class="auth-form">
            <h2 data-i18n="login_title">Connexion</h2>
            <input type="email" id="login-email" data-i18n-placeholder="email" placeholder="Email" required>
            <input type="password" id="login-password" data-i18n-placeholder="password" placeholder="Mot de passe" required>
            <button type="submit" data-i18n="login_button">Se connecter</button>
        </form>

        <form id="register-form" class="auth-form">
            <h2 data-i18n="register_title">Inscription</h2>
            <input type="text" id="register-firstname" data-i18n-placeholder="first_name" placeholder="Prénom" required>
            <input type="email" id="register-email" data-i18n-placeholder="email" placeholder="Email" required>
            <input type="password" id="register-password" data-i18n-placeholder="password" placeholder="Mot de passe" required>
            <button type="submit" data-i18n="register_button">S'inscrire</button>
        </form>

        <p id="auth-error"></p>
    </div>

    <!-- ═══════ VUE CHAT (visible si connecté) ═══════ -->
    <div id="chat-view" style="display: none;">
        <div class="bienvenue">
            <span><span data-i18n="hello">Bonjour</span> <span id="bonjour"></span> 👋</span>
            <button type="button" id="logout-btn" data-i18n="logout">Déconnexion</button>
        </div>

        <label><input type="radio" name="mode" value="tutor" checked> <span data-i18n="mode_tutor">Tuteur</span></label>
        <label><input type="radio" name="mode" value="copilot"> <span data-i18n="mode_copilot">Copilote</span></label>

        <div id="conversation"></div>

        <form id="formulaire">
            <textarea id="saisie" data-i18n-placeholder="input_placeholder" placeholder="Pose ta question..." rows="3"></textarea>
            <button type="submit" data-i18n="send">Envoyer</button>
        </form>
    </div>

    <!-- Ordre important : services (api) → vue (ui) → controllers (chat, auth) → i18n -->
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/i18n.js"></script>
</body>

</html>
